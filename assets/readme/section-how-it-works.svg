<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="140" viewBox="0 0 1200 140" role="img">
  <!-- Solid vibrant background -->
  <rect width="1200" height="140" rx="16" fill="#3B82F6"/>
  
  <!-- Contrasting left accent bar -->
  <rect x="0" y="20" width="8" height="100" fill="#FBBF24"/>
  
  <text x="60" y="65" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="900" fill="#FFFFFF">How it works</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" font-weight="500" fill="#DBEAFE">The TEARDOWN to CREATIVE pipeline.</text>
  
  <!-- Faint giant number -->
  <text x="1160" y="145" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="160" font-weight="900" fill="#FFFFFF" opacity="0.1" text-anchor="end" letter-spacing="-5">03</text>
  
  <!-- Decorative dots on the far right using the accent color (two concentric circles) -->
  <g transform="translate(1100, 50)">
    <circle cx="20" cy="20" r="14" fill="#FBBF24" opacity="0.25"/>
    <circle cx="20" cy="20" r="6" fill="#FBBF24" opacity="1"/>
  </g>
</svg>