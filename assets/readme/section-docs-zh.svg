<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="140" viewBox="0 0 1200 140" role="img">
  <!-- Solid vibrant background -->
  <rect width="1200" height="140" rx="16" fill="#FF705E"/>
  
  <!-- Contrasting left accent bar -->
  <rect x="0" y="20" width="8" height="100" fill="#FDF8F0"/>
  
  <text x="60" y="65" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="900" fill="#0F172A">文档入口</text>
  <text x="60" y="100" font-family="-apple-system, sans-serif" font-size="18" font-weight="500" fill="#1E293B">参考指南、手册与 QA 场景。</text>
  
  <!-- Faint giant number -->
  <text x="1160" y="145" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="160" font-weight="900" fill="#0F172A" opacity="0.1" text-anchor="end" letter-spacing="-5">04</text>
  
  <!-- Decorative dots on the far right using the accent color (two concentric circles) -->
  <g transform="translate(1100, 50)">
    <circle cx="20" cy="20" r="14" fill="#FDF8F0" opacity="0.25"/>
    <circle cx="20" cy="20" r="6" fill="#FDF8F0" opacity="1"/>
  </g>
</svg>